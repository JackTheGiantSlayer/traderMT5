<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity MT5 & Exness Trading Dashboard</title>

    <!-- Modern Typography: Google Fonts (Outfit & Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Custom Modern Dark CSS -->
    <link rel="stylesheet" href="/static/css/style.css?v=1.0.1">

</head>

<body>
    <div id="root">
        <!-- Loader during initial script load -->
        <div class="initial-loader">
            <div class="loader-spinner"></div>
            <h2>กำลังโหลดระบบกระดานเทรด...</h2>
            <p>กรุณารอสักครู่ ระบบกำลังจัดเตรียมหน้าจอพรีเมียมแดชบอร์ด</p>
        </div>
    </div>
    <!-- React 18 & ReactDOM via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    <!-- Babel compiler for in-browser JSX parsing (zero-install) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>

    <!-- TradingView Lightweight Charts (Professional candlestick charting library) -->
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"
        crossorigin></script>

    <!-- React Application - Loaded as a Babel script -->
    <script type="text/babel" src="/static/js/app.js"></script>



</body>

</html>
